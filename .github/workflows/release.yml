name: Build & Release

on:
  push:
    tags:
      - 'v*'        # релиз триггерится при пуше тега вида v2.0, v2.1 ...

permissions:
  contents: write   # нужно, чтобы создать Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: chmod +x ./gradlew && ./gradlew build --no-daemon

      - name: Keep only the runnable jar
        run: rm -f build/libs/*-sources.jar

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/xaclient-*.jar
